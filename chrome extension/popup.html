<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        width: 250px;  /* Немного увеличим ширину */
        padding: 10px;
        font-family: Arial, sans-serif;
        text-align: center;
      }
      #appId {
        font-size: 18px;
        font-weight: bold;
        margin: 10px 0;
        color: #4CAF50;
      }
      #message {
        color: #666;
        margin: 10px 0;
      }
      .status-indicator {
        display: inline-block;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background-color: red;
        margin-right: 5px;
        vertical-align: middle;
      }
      .status-container {
        margin: 10px 0;
        display: none;
        text-align: left;
      }
      .result-container {
        margin-top: 15px;
        padding: 10px;
        background-color: #f5f5f5;
        border-radius: 5px;
        text-align: left;
      }
      .result-title {
        font-weight: bold;
        margin-bottom: 5px;
      }
      .result-value {
        color: #333;
      }
    </style>
  </head>
  <body>
    <h3>Steam App Checker</h3>
    <div id="appId"></div>
    <div id="message"></div>

    <div class="status-container" id="localServerStatus">
      <span class="status-indicator" id="localStatus"></span>
      <span id="localStatusText">Local: Request not sent</span>
    </div>

    <div class="status-container" id="remoteServerStatus">
      <span class="status-indicator" id="remoteStatus"></span>
      <span id="remoteStatusText">Remote: Not processed</span>
    </div>

    <div class="result-container" id="apiResults" style="display: none;">
      <div class="result-title">Prediction:</div>
      <div class="result-value" id="predictionResult">-</div>

      <div class="result-title">Probability:</div>
      <div class="result-value" id="probabilityResult">-</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
